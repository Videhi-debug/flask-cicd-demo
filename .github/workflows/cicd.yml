name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]   # pipeline runs when you push to main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # GitHub provides a Linux VM

    steps:
    - name: Checkout code
      uses: actions/checkout@v3   # pulls your repo code into the VM

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t <your-dockerhub-username>/flask-cicd-demo:latest .
        docker push <your-dockerhub-username>/flask-cicd-demo:latest
